<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel de Imágenes</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }

        .padre {
            padding-left: 150px;
            margin-left: auto;
            margin-right: auto;
            margin-top: 130px;
        }

        .slide {
            border-color: 2px solid red;
            
            width: 80%;
            height: 400px;
        }

        .carousel {
            /*width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;*/
            
        }

        .carousel-item img {
            /*border: 2px solid blue;*/
            border-radius: 5px;
            height: 250px;
        }

        img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div class="padre">
        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">

            <!-- Indicadores -->
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
            </div>

            <!-- Contenido del carrusel -->
            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="flor1.jpg" alt="Flor rosada">
                    <div class="carousel-caption">
                        <h5>Flor Rosada</h5>
                        <p>Hermosa flor en primer plano</p>
                    </div>
                </div>

                <div class="carousel-item">
                    <img src="flor2.jpg" alt="Flores de colores">
                    <div class="carousel-caption">
                        <h5>Flores de Colores</h5>
                        <p>Variedad de flores en el jardín</p>
                    </div>
                </div>

                <div class="carousel-item">
                    <img src="flor3.jpg" alt="Rosa roja">
                    <div class="carousel-caption">
                        <h5>Rosa Roja</h5>
                        <p>Elegancia y naturaleza</p>
                    </div>
                </div>

            </div>

            <!-- Botón anterior -->
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <!-- Botón siguiente -->
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>

        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
