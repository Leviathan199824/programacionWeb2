<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body.dark {
        background-color: #121212;
        color: white;
    }

    body.dark .navbar {
        background-color: #222 !important;
    }

    .card-custom {
        border: none;
        border-radius: 15px;
        overflow: hidden;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .card-custom:hover {
        transform: translateY(-10px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .card-custom img {
        height: 200px;
        object-fit: cover;
    }

    #alerta {
        display: none;
    }
</style>

<body>

    <nav class="navbar navbar-light bg-light">
        <div class="container">
            <span class="navbar-brand">MiWeb</span>
            <button class="btn btn-dark" onclick="toggleDark()">🌙</button>
        </div>
    </nav>
    <div id="alerta" class="alert alert-success mt-3">
        ✔ Acción realizada correctamente
    </div>
    <center>
        <div class="container mt-5">
            <h2>Contenido de la página</h2>
        </div>
    </center>
    <div class="container mt-5">
        <div class="row">

            <div class="col-md-4">
                <div class="card card-custom">
                    <img src="https://picsum.photos/400/200" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">Card Moderna</h5>
                        <p class="card-text">Ejemplo de tarjeta con efecto hover elegante.</p>
                        <button class="btn btn-primary">Ver más</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-custom">
                    <img src="https://picsum.photos/400/200" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">Card Moderna</h5>
                        <p class="card-text">Ejemplo de tarjeta con efecto hover elegante.</p>
                        <button class="btn btn-primary">Ver más</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-custom">
                    <img src="https://picsum.photos/400/200" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">Card Moderna</h5>
                        <p class="card-text">Ejemplo de tarjeta con efecto hover elegante.</p>
                        <button class="btn btn-primary">Ver más</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function toggleDark() {
            document.body.classList.toggle("dark");
            let alerta = document.getElementById("alerta");
            alerta.style.display = "block";

            setTimeout(() => {
                alerta.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</div>

</html>
